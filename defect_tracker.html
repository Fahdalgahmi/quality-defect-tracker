<!DOCTYPE html>
<html>
<head>
    <title>Quality Defect Tracker</title>
</head>
<body>

<h1>Quality Defect Tracker</h1>

<button onclick="loadDefects()">Load Defects</button>

<label>Filter Severity:</label>

<select id="severityFilter" onchange="loadDefects()">
    <option value="All">All</option>
    <option value="Critical">Critical</option>
    <option value="High">High</option>
    <option value="Medium">Medium</option>
    <option value="Low">Low</option>
</select>

<h2>Dashboard</h2>

<div>
    <h3>Total Defects: <span id="totalDefects">0</span></h3>
    <h3>Open Defects: <span id="openDefects">0</span></h3>
    <h3>Critical Defects: <span id="criticalDefects">0</span></h3>
</div>

<table border="1" cellpadding="8" style="margin-top:20px;">
    <thead>
        <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Shift</th>
            <th>Part</th>
            <th>Machine</th>
            <th>Defect</th>
            <th>Qty</th>
            <th>Severity</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="defectTable"></tbody>
</table>

<h2>Add New Defect</h2>

<form id="defectForm">
    <input type="date" id="defect_date" required>
    <input type="text" id="shift" placeholder="Shift" required>
    <input type="text" id="part_number" placeholder="Part Number" required>
    <input type="text" id="machine" placeholder="Machine">
    <input type="text" id="defect_type" placeholder="Defect Type" required>
    <input type="number" id="quantity" placeholder="Quantity" required>
    <input type="text" id="severity" placeholder="Severity">
    <button type="submit">Add Defect</button>
</form>

<script>

async function loadDefects() {

    const response = await fetch("http://127.0.0.1:8000/defects");
    const data = await response.json();

    const selectedSeverity =
        document.getElementById("severityFilter").value;

    document.getElementById("totalDefects").textContent =
        data.length;

    const openDefects =
        data.filter(d => d.status === "Open").length;

    document.getElementById("openDefects").textContent =
        openDefects;

    const criticalDefects =
        data.filter(d => d.severity === "Critical").length;

    document.getElementById("criticalDefects").textContent =
        criticalDefects;

    const table =
        document.getElementById("defectTable");

    table.innerHTML = "";

    const filteredData =
        selectedSeverity === "All"
            ? data
            : data.filter(
                d => d.severity === selectedSeverity
            );

    filteredData.forEach(defect => {

        table.innerHTML += `
            <tr>
                <td>${defect.defect_id}</td>
                <td>${defect.defect_date}</td>
                <td>${defect.shift}</td>
                <td>${defect.part_number}</td>
                <td>${defect.machine}</td>
                <td>${defect.defect_type}</td>
                <td>${defect.quantity}</td>
                <td>${defect.severity}</td>
                <td>${defect.status}</td>
            </tr>
        `;
    });
}

document.getElementById("defectForm")
.addEventListener("submit", async function(event) {

    event.preventDefault();

    const defect = {

        defect_date:
            document.getElementById("defect_date").value,

        shift:
            document.getElementById("shift").value,

        part_number:
            document.getElementById("part_number").value,

        machine:
            document.getElementById("machine").value,

        defect_type:
            document.getElementById("defect_type").value,

        quantity:
            parseInt(
                document.getElementById("quantity").value
            ),

        severity:
            document.getElementById("severity").value,

        status: "Open"
    };

    const response = await fetch(
        "http://127.0.0.1:8000/defects",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(defect)
        }
    );

    const result = await response.json();

    alert(result.message);

    document.getElementById("defectForm").reset();

    loadDefects();
});

loadDefects();

</script>

</body>
</html>
